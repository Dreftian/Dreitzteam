name: Test

# Corre en cada PR y en push a main. No bloquea releases (los releases corren en release.yml).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Programa
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Programa/package-lock.json

      - name: Install
        run: npm ci

      - name: TypeScript compile check (no emit)
        run: npx tsc --noEmit -p tsconfig.web.json
        continue-on-error: true

      - name: Build (smoke test)
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e -- --reporter=line
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Programa/playwright-report/
          retention-days: 7
